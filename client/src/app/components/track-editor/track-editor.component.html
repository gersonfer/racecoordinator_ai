<div class="page-container" [style.transform]="'translate(-50%, -50%) scale(' + scale + ')'">
  <div class="header">
    <div class="header-left">
      <app-back-button route="/track-manager" [confirm]="isDirty"
        [queryParams]="{ selectedId: editingTrack?.entity_id }" confirmTitle="TE_CONFIRM_DISCARD_TITLE"
        confirmMessage="TE_CONFIRM_DISCARD_MESSAGE"></app-back-button>
      <h1 class="page-title">{{ 'TE_TITLE' | translate }}</h1>
    </div>
    <div class="header-right">
      <app-undo-redo-controls [manager]="undoManager"></app-undo-redo-controls>
    </div>
  </div>

  <div class="content-split">
    <!-- Editor Panel -->
    <div class="editor-panel">
      <div class="editor-section fixed-header">
        <label class="track-name-label">{{ 'TE_TRACK_NAME' | translate }}</label>
        <input type="text" [(ngModel)]="trackName" (focus)="onInputFocus()" (blur)="onInputBlur()"
          (ngModelChange)="onInputChange()" autocomplete="off" data-lpignore="true" data-form-type="other"
          name="trackNameInput">
      </div>

      <div class="sections-wrapper">

        <div class="config-section">
          <div class="section-header" (click)="toggleSection('lanes')">
            <span class="expander-icon" [class.collapsed]="!sectionsExpanded.lanes">▼</span>
            <h1>{{ 'TE_LANE_EDITOR' | translate }}</h1>
            <div class="spacer"></div>
            <button class="action-btn small add-list-btn" (click)="addLane(); $event.stopPropagation()">+</button>
          </div>

          <div class="section-content" *ngIf="sectionsExpanded.lanes">
            <div class="lanes-list">
              <div *ngFor="let lane of lanes; let i = index; trackBy: trackByLane" class="lane-item">
                <div class="lane-preview-badge" [style.background-color]="lane.background_color"
                  [style.color]="lane.foreground_color">
                  <span class="preview-number">#{{ i + 1 }}</span>
                  <input type="number" class="preview-length-input" [ngModel]="lane.length"
                    (change)="updateLaneLength(i, $any($event.target).value)" (focus)="onInputFocus()"
                    (blur)="onInputBlur()">
                </div>

                <div class="lane-controls">
                  <div class="control-group">
                    <label>{{ 'TE_BACKGROUND_COLOR' | translate }}</label>
                    <input type="color" [ngModel]="lane.background_color"
                      (ngModelChange)="updateLaneBackgroundColor(i, $event)" (focus)="onInputFocus()"
                      (blur)="onInputBlur()">
                  </div>

                  <div class="control-group">
                    <label>{{ 'TE_FOREGROUND_COLOR' | translate }}</label>
                    <input type="color" [ngModel]="lane.foreground_color"
                      (ngModelChange)="updateLaneForegroundColor(i, $event)" (focus)="onInputFocus()"
                      (blur)="onInputBlur()">
                  </div>
                </div>

                <button class="action-btn danger small" (click)="removeLane(i)">X</button>
              </div>
            </div>
          </div>
        </div>

        <div class="config-section">
          <div class="section-header" (click)="toggleSection('interfaces')">
            <span class="expander-icon" [class.collapsed]="!sectionsExpanded.interfaces">▼</span>
            <h1>{{ 'TE_INTERFACES' | translate }}</h1>
          </div>

          <div class="section-content" *ngIf="sectionsExpanded.interfaces">
            <div class="editor-section">
              <div style="display: flex; align-items: center; justify-content: space-between; padding: 0;">
                <span>Arduino</span>
                <button class="action-btn small add-list-btn"
                  (click)="addArduinoConfig(); $event.stopPropagation()">+</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="editor-actions">
        <div class="spacer"></div>
        <button class="action-btn" (click)="saveAsNew()" [disabled]="isSaving || !isNameUnique(false)"
          [title]="(!isNameUnique(false)) ? ('TE_ERROR_NAME_EXISTS' | translate) : ''">
          {{ 'TE_SAVE_AS_NEW' | translate }}
        </button>
        <button class="action-btn primary" (click)="updateTrack()"
          [disabled]="isSaving || !hasChanges() || !isNameUnique(true)"
          [title]="(hasChanges() && !isNameUnique(true)) ? ('TE_ERROR_NAME_EXISTS' | translate) : ''">
          {{ 'TE_UPDATE' | translate }}
        </button>
      </div>
    </div>

    <!-- Track Interface Visualization -->
    <div class="preview-panel" [style.overflow-y]="arduinoConfigs.length > 0 ? 'auto' : 'hidden'">
      <div *ngIf="arduinoConfigs.length === 0" class="empty-state">
        <h3>{{ 'TE_NO_INTERFACES_ADDED' | translate }}</h3>
        <p>{{ 'TE_NO_INTERFACES_DESC' | translate }}</p>
      </div>

      <div class="interface-container"
        *ngFor="let config of arduinoConfigs; let i = index; trackBy: trackByArduinoConfig">
        <app-arduino-editor [config]="config" [lanes]="lanes" (configChange)="captureState()" [index]="i"
          [count]="arduinoConfigs.length" (remove)="removeArduinoConfig(i)">
        </app-arduino-editor>
      </div>
    </div>
  </div>
</div>
